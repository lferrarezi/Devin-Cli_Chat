kotlin.code.style=official
org.gradle.configuration-cache=false
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
# JDK 17 é necessário para o Gradle neste projeto (compatível com JDK 21+).
# Para definir localmente, crie gradle.local.properties com:
#   org.gradle.java.home=/caminho/para/jdk17
# Ou defina a variável de ambiente: export JAVA_HOME=/caminho/para/jdk17
# Baixar JDK 17: https://adoptium.net/temurin/releases/?version=17
